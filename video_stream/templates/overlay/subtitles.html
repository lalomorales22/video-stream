<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>video-stream · subtitles overlay</title>
  <style>
    :root {
      --subtitle-font-family: -apple-system, Inter, "Segoe UI", sans-serif;
      --subtitle-font-size: 56px;
      --subtitle-text-color: #ffffff;
      --subtitle-bg-rgba: rgba(0, 0, 0, 0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      font-family: var(--subtitle-font-family);
    }
    #subtitle-stage {
      position: fixed;
      left: 50%;
      bottom: 6.5vh;
      transform: translateX(-50%);
      width: min(1720px, 96vw);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    #subtitle-box {
      max-width: 100%;
      text-align: center;
      color: var(--subtitle-text-color);
      font-size: var(--subtitle-font-size);
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: 0.4px;
      border-radius: 22px;
      padding: 12px 22px;
      background: var(--subtitle-bg-rgba);
      text-shadow:
        0 2px 10px rgba(0, 0, 0, 0.9),
        0 0 4px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 140ms ease, transform 140ms ease;
      word-wrap: break-word;
    }
    #subtitle-box.visible { opacity: 1; transform: translateY(0); }
    #subtitle-box.interim { opacity: 0.82; font-style: italic; }
    #subtitle-hint {
      position: fixed;
      right: 14px;
      bottom: 12px;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.58);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="subtitle-stage"><div id="subtitle-box"></div></div>
  <div id="subtitle-hint">Subtitles idle</div>

  <script src="/static/js/bus.js?v={{ asset_v }}"></script>
  <script>
    const subtitleBox = document.getElementById("subtitle-box");
    const subtitleHint = document.getElementById("subtitle-hint");
    let clearTimer = null;
    let interimTimer = null;

    function hexToRgba(hex, alpha) {
      const clean = String(hex || "").replace("#", "").trim();
      if (clean.length !== 3 && clean.length !== 6) return `rgba(0, 0, 0, ${alpha})`;
      const value = clean.length === 3 ? clean.split("").map((p) => `${p}${p}`).join("") : clean;
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      if ([r, g, b].some(Number.isNaN)) return `rgba(0, 0, 0, ${alpha})`;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clampNum(value, low, high, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? Math.max(low, Math.min(high, n)) : fallback;
    }

    function applySettings(s) {
      if (!s || typeof s !== "object") return;
      const root = document.documentElement.style;
      if (typeof s.font_family === "string" && s.font_family.trim()) {
        root.setProperty("--subtitle-font-family", s.font_family.trim());
      }
      root.setProperty("--subtitle-font-size", `${clampNum(s.font_size_px, 18, 140, 56)}px`);
      if (typeof s.text_color === "string" && s.text_color.trim()) {
        root.setProperty("--subtitle-text-color", s.text_color.trim());
      }
      const alpha = clampNum(s.background_opacity, 0, 1, 0.45);
      root.setProperty("--subtitle-bg-rgba", hexToRgba(s.background_color || "#000000", alpha));
    }

    function hideSubtitle() {
      subtitleBox.classList.remove("visible");
      subtitleBox.classList.remove("interim");
      subtitleHint.textContent = "Subtitles idle";
    }

    function showSubtitle(data) {
      if (!data || typeof data !== "object") return;
      const text = typeof data.text === "string" ? data.text.trim() : "";
      const isFinal = data.final !== false;
      if (!text) {
        hideSubtitle();
        return;
      }
      subtitleBox.textContent = text; // textContent, never innerHTML
      subtitleBox.classList.add("visible");
      subtitleBox.classList.toggle("interim", !isFinal);
      subtitleHint.textContent = isFinal ? "Subtitles live" : "Listening...";

      clearTimeout(clearTimer);
      clearTimeout(interimTimer);
      if (isFinal) {
        clearTimer = setTimeout(hideSubtitle, 3600);
      } else {
        // An interim line orphaned by a dead recognizer must not sit
        // on screen forever (improvement over the source).
        interimTimer = setTimeout(hideSubtitle, 9000);
      }
    }

    Bus.on("subtitle_settings", applySettings);
    Bus.on("subtitle_update", showSubtitle);
    // Bootstrap fetch covers the pre-retained-event window on first load.
    fetch("/api/subtitles/settings").then((r) => r.json()).then(applySettings).catch(() => {});
    fetch("/api/subtitles/state").then((r) => r.json()).then(showSubtitle).catch(() => {});
  </script>
</body>
</html>
