<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ name }} · video-stream</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
    .badge {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.72);
      font: 500 11px/1 "IBM Plex Mono", ui-monospace, monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }
    body:hover .badge { opacity: 1; }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff3d6e;
      box-shadow: 0 0 10px #ff3d6e;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }
    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
    }
  </style>
</head>
<body>
  <div class="badge"><span class="dot"></span>{{ name }}</div>
  <div class="stage">
    <img src="{{ stream_url }}" alt="{{ name }} live stream" />
  </div>
</body>
</html>
